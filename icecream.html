<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이스크림 도난 사건 — 학교 추리 방탈출</title>
<style>
  :root{
    --bg:#171226; --panel:#231C38; --panel-2:#2C2447; --line:#443A6B;
    --amber:#FFB13D; --ok:#59D98C; --err:#FF5D5D;
    --ink:#EFEAF7; --ink-dim:#A79FC2;
    --mono:'Courier New',monospace;
    --sans:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:20px 12px 60px;
  }
  .frame{width:100%;max-width:800px}

  .hud{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    font-family:var(--mono);font-size:13px;color:var(--ink-dim);
    border:1px solid var(--line);border-radius:8px;
    padding:8px 12px;margin-bottom:12px;background:var(--panel);flex-wrap:wrap;
  }
  .hud b{color:var(--amber)}
  #timer{color:var(--ok)}
  .hud-btns{display:flex;gap:8px;flex-wrap:wrap}
  .hud-btns button{
    background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    border-radius:7px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:var(--sans);
  }
  .hud-btns button:hover{border-color:var(--amber)}
  .hud-btns button.hintbtn{margin-left:14px;border-style:dashed;color:var(--ink-dim)}
  .hud-btns button.hintbtn:hover{color:var(--amber)}
  .hud-btns button.danger{border-color:#6B3A4A}
  .hud-btns button.danger:hover{border-color:var(--err);color:var(--err)}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:26px 24px;box-shadow:0 10px 34px rgba(0,0,0,.5);
  }
  .unit-tag{
    display:inline-block;font-family:var(--mono);font-size:12px;letter-spacing:1px;
    color:#171226;background:var(--amber);padding:3px 10px;border-radius:4px;margin-bottom:12px;
  }
  h1{font-size:25px;margin-bottom:12px;letter-spacing:-.5px}
  h2{font-size:18px;line-height:1.5;margin-bottom:10px}
  h3{color:var(--amber);font-size:17px;margin-bottom:12px}
  h4{color:var(--amber);font-size:14px;margin:12px 0 8px}
  p{line-height:1.75;color:var(--ink-dim);font-size:15px;margin-bottom:12px}
  p strong{color:var(--ink)}
  .dim{color:var(--ink-dim);font-size:13.5px}

  /* 장면 */
  .scene-wrap{
    position:relative;border:4px solid var(--line);border-radius:8px;
    background:#000;line-height:0;
  }
  canvas{image-rendering:pixelated;max-width:100%;height:auto;display:block}
  .scene-title{
    font-family:var(--mono);font-size:13px;color:var(--amber);
    margin:10px 0 6px;text-align:center;letter-spacing:1px;
  }
  .nav-row{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
  .nav-row button{
    background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:9px 13px;font-size:13.5px;cursor:pointer;font-family:var(--sans);
  }
  .nav-row button:hover{border-color:var(--amber)}
  .nav-row button.cleared{border-color:var(--ok);color:var(--ok)}
  .msgbar{min-height:22px;margin-top:10px;text-align:center;font-size:14px;line-height:1.6;color:var(--ink-dim)}
  .msgbar strong{color:var(--amber)}
  .msgbar.ok{color:var(--ok)} .msgbar.ok strong{color:var(--ok)}

  button.main{
    font-family:var(--sans);font-size:15px;font-weight:700;
    background:var(--amber);color:#171226;border:none;border-radius:8px;
    padding:12px 26px;cursor:pointer;
  }
  button.main:hover{box-shadow:0 0 16px rgba(255,177,61,.5)}
  button.ghost{
    background:transparent;color:var(--amber);border:1px solid var(--line);
    border-radius:8px;padding:11px 18px;font-size:14px;cursor:pointer;font-family:var(--sans);
  }
  button.ghost:hover{border-color:var(--amber)}
  button.big{width:100%;padding:15px;font-size:16px;margin-top:10px}

  .fb{margin-top:12px;font-size:14px;min-height:20px;text-align:center;line-height:1.6}
  .fb.ok{color:var(--ok)} .fb.no{color:var(--err)}

  .board-form{display:flex;gap:10px;margin:16px 0 6px}
  .board-form input,.board-form select{
    font-family:var(--sans);font-size:16px;background:var(--bg);
    color:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;outline:none;min-width:0;
  }
  .board-form select{flex:0 0 130px}
  .board-form input{flex:1}
  .board-form input:focus,.board-form select:focus{border-color:var(--amber)}
  .board{margin:14px 0;text-align:left}
  .board-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid var(--line);font-size:15px}
  .board-row .rank{font-family:var(--mono);color:var(--amber);width:40px;font-weight:bold;text-align:center}
  .board-row .cl{font-family:var(--mono);color:var(--ink-dim);width:48px;text-align:center;flex-shrink:0}
  .board-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .board-row .tm{font-family:var(--mono);color:var(--ok)}
  .board-row.top1{background:rgba(255,177,61,.07);border-radius:8px}
  .board-row.head{border-bottom:1px solid var(--amber)}
  .board-row.head span{color:var(--amber);font-size:12px;font-weight:700;font-family:var(--sans)}

  /* 모달 */
  #modal{
    position:fixed;inset:0;background:rgba(12,9,22,.8);
    display:none;align-items:center;justify-content:center;z-index:50;padding:18px;
  }
  #modal .mcard{
    background:var(--panel);border:2px solid var(--amber);border-radius:14px;
    padding:24px 26px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;
    box-shadow:0 12px 44px rgba(0,0,0,.7);
  }
  #modal p{font-size:14.5px;line-height:1.8;color:var(--ink);margin-bottom:10px}
  #modal .dim{color:var(--ink-dim)}
  .center{text-align:center}

  /* 단서 쪽지 */
  .cluepaper{
    background:#FFF8E0;color:#3A2E1A;border-radius:10px;
    border:1px dashed #C9B27E;padding:14px 16px;margin-bottom:14px;
    font-size:14px;line-height:1.8;text-align:left;
  }
  #modal .cluepaper p{color:#3A2E1A;font-size:14px;margin:3px 0}
  #modal .cluepaper p strong{color:#1F1608}
  #modal .cluepaper .deduce{color:#B13E53;font-weight:700;margin-top:10px}

  .suscard{
    display:flex;gap:14px;align-items:center;
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:10px 13px;margin-bottom:9px;
  }
  .susface{
    width:64px;height:64px;flex-shrink:0;border-radius:8px;
    border:1px solid var(--line);image-rendering:pixelated;
  }
  .susinfo b{color:var(--amber);font-size:15px;display:block;margin-bottom:3px}
  .susinfo p{font-size:12.5px;color:var(--ink);margin:1px 0;line-height:1.5}
  .susmemo{color:var(--ink-dim) !important;font-style:italic}

  .clue-item2{
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:11px 13px;margin-bottom:9px;text-align:left;font-size:13.5px;line-height:1.7;
  }
  .clue-item2 b{display:block;font-size:12.5px;color:var(--amber);margin-bottom:4px}
  .clue-item2 p{font-size:13.5px;color:var(--ink);margin:2px 0}
  .clue-item2 .deduce{color:var(--amber);font-weight:700;margin-top:6px}

  .tabs{display:flex;gap:6px;margin-bottom:10px;justify-content:center}
  .tab{
    font-family:var(--sans);font-size:13.5px;padding:8px 16px;cursor:pointer;
    background:var(--panel-2);color:var(--ink-dim);border:1px solid var(--line);border-radius:8px;
  }
  .tab.on{background:var(--amber);color:#171226;font-weight:700;border-color:var(--amber)}
  .pane{
    text-align:left;max-height:52vh;overflow-y:auto;
    background:var(--bg);border:1px solid var(--line);border-radius:10px;
    padding:12px;margin-bottom:12px;
  }

  .gsec{margin:10px 0}
  .grow{display:flex;align-items:center;gap:10px;margin:5px 0;flex-wrap:wrap}
  .ginfo{font-size:12px;color:var(--ink-dim)}
  .gwrap{display:flex;flex-wrap:wrap;gap:6px}
  .mark,.choice{
    font-family:var(--sans);font-size:13px;padding:7px 11px;cursor:pointer;
    border:1px solid var(--line);border-radius:7px;background:var(--panel-2);color:var(--ink);
  }
  .mark:hover,.choice:hover{border-color:var(--amber)}
  .mark.m1{background:#4A2634;color:#E88;text-decoration:line-through;border-color:#6B3A4A}
  .mark.m2{background:#1E3A2C;color:var(--ok);font-weight:700;border-color:#2E5C44}
  .choice.sel{background:var(--amber);color:#171226;font-weight:700;border-color:var(--amber)}

  .toast{
    position:fixed;top:18px;left:50%;transform:translateX(-50%);
    background:var(--ok);color:#171226;font-weight:700;font-size:14px;
    border-radius:8px;padding:10px 20px;z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.5);
    animation:toastIn .25s;max-width:92vw;text-align:center;
  }
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}

  .escape-art{font-size:60px;text-align:center;margin:8px 0 16px}
  .stats{font-family:var(--mono);text-align:center;font-size:15px;color:var(--ink-dim);margin-bottom:20px;line-height:2}
  .stats b{color:var(--ok);font-size:21px}

  @media (max-width:520px){
    h1{font-size:21px} .card{padding:20px 15px}
    .nav-row button{font-size:12px;padding:8px 9px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>
<body>
<div class="frame">
  <div class="hud">
    <span>🕵️ <b>아이스크림 도난 사건</b></span>
    <span>⏱ <span id="timer">00:00.000</span></span>
    <span>🔍 <b id="hudFound">0/15</b></span>
    <span>🚨 <b id="hudGuess">3</b>회</span>
    <div class="hud-btns" id="hudBtns" style="display:none">
      <button id="btnNote">📒 수첩</button>
      <button id="btnAccuse" class="danger">🚨 지목</button>
      <button id="btnHint" class="hintbtn">💡 힌트 3회 (+10초)</button>
    </div>
  </div>
  <div id="screen"></div>
</div>

<div id="modal"><div class="mcard" id="mbody"></div></div>
