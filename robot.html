<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로봇 연구소 탈출 — 사고력 방탈출</title>
<style>
  :root{
    --bg:#12161F;
    --panel:#1A2130;
    --panel-2:#222B3E;
    --line:#33405C;
    --amber:#FFB13D;
    --amber-deep:#C97F14;
    --ok:#59D98C;
    --err:#FF5D5D;
    --ink:#E9EDF5;
    --ink-dim:#98A4BC;
    --mono:'Courier New', Courier, monospace;
    --sans:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:24px 14px 60px;
  }
  .frame{width:100%;max-width:760px}

  .hud{
    display:flex;justify-content:space-between;align-items:center;
    font-family:var(--mono);font-size:13px;color:var(--ink-dim);
    border:1px solid var(--line);border-radius:8px;
    padding:8px 14px;margin-bottom:16px;background:var(--panel);
  }
  .hud b{color:var(--amber)}
  #timer{color:var(--ok)}

  .trace{display:flex;align-items:center;margin-bottom:22px}
  .node{
    width:18px;height:18px;border-radius:50%;
    border:2px solid var(--line);background:var(--panel-2);
    flex-shrink:0;transition:all .4s;
  }
  .node.done{border-color:var(--ok);background:var(--ok);box-shadow:0 0 8px rgba(89,217,140,.6);cursor:pointer}
  .node.done:hover{transform:scale(1.3)}
  .node.now{border-color:var(--amber);box-shadow:0 0 8px rgba(255,177,61,.6)}
  .wire{flex:1;height:2px;background:var(--line);transition:background .4s}
  .wire.done{background:var(--ok)}

  /* 코드 조각 다시 보기 오버레이 */
  #peekOverlay{
    position:fixed;inset:0;background:rgba(18,22,31,.8);
    display:flex;align-items:center;justify-content:center;
    z-index:90;padding:20px;
  }
  #peekOverlay .peek-card{
    background:var(--panel);border:1px solid var(--ok);border-radius:14px;
    padding:26px 30px;text-align:center;max-width:340px;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
  }
  #peekOverlay .digit{
    font-family:var(--mono);font-size:44px;font-weight:bold;color:var(--ok);
    letter-spacing:6px;display:block;margin-top:10px;
    text-shadow:0 0 14px rgba(89,217,140,.6);
  }
  .door-node{
    width:28px;height:28px;border-radius:8px;
    border:2px solid var(--amber);display:flex;align-items:center;justify-content:center;
    font-size:14px;flex-shrink:0;background:var(--panel);
  }

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:28px 26px;box-shadow:0 10px 34px rgba(0,0,0,.5);
    border-top:6px solid transparent;
    border-image:repeating-linear-gradient(45deg,var(--amber) 0 12px,#1A2130 12px 24px) 1;
  }
  .unit-tag{
    display:inline-block;font-family:var(--mono);font-size:12px;letter-spacing:1px;
    color:#12161F;background:var(--amber);padding:3px 10px;border-radius:4px;margin-bottom:14px;
  }
  h1{font-size:26px;margin-bottom:14px;letter-spacing:-.5px}
  h2{font-size:19px;line-height:1.5;margin-bottom:12px}
  p{line-height:1.75;color:var(--ink-dim);font-size:15px;margin-bottom:12px}
  p strong{color:var(--ink)}
  .rulebox{
    background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--amber);
    border-radius:8px;padding:14px 16px;margin:14px 0;font-size:14px;line-height:1.8;color:var(--ink);
  }

  /* 미로 */
  .maze-wrap{display:flex;justify-content:center;margin:18px 0;overflow-x:auto}
  .maze{display:grid;gap:3px;background:var(--bg);padding:6px;border-radius:10px;border:1px solid var(--line)}
  .cell{
    width:42px;height:42px;border-radius:6px;background:#141A28;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.6);
    display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;
  }
  .cell.wall{
    border-radius:4px;
    background:repeating-linear-gradient(45deg,#4A5570 0 7px,#333D55 7px 14px);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,.18),
      inset 0 -5px 0 rgba(0,0,0,.55),
      inset 3px 0 0 rgba(255,255,255,.06),
      inset -3px 0 0 rgba(0,0,0,.3);
    border:1px solid #5A6684;
  }
  .cell.goal{background:rgba(89,217,140,.15);box-shadow:inset 0 0 0 2px var(--ok)}
  .cell.goal::after{content:"🚩"}
  .cell.clickable{cursor:pointer;transition:box-shadow .12s}
  .cell.clickable:hover{box-shadow:inset 0 0 0 2px var(--amber)}
  .cell.picked-wrong{box-shadow:inset 0 0 0 2px var(--err);animation:shake .3s}
  .bot{
    position:absolute;width:32px;height:32px;border-radius:50%;
    background:var(--amber);display:flex;align-items:center;justify-content:center;
    font-size:17px;color:#12161F;transition:transform .28s;
    box-shadow:0 0 12px rgba(255,177,61,.55);z-index:2;
  }
  .bot.crash{background:var(--err);box-shadow:0 0 14px rgba(255,93,93,.7);animation:shake .35s}

  /* 명령 블록 */
  .cmd-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0 8px}
  .cmd-btn{
    font-size:14px;font-weight:700;font-family:var(--sans);
    background:var(--panel-2);color:var(--ink);
    border:1px solid var(--amber-deep);border-bottom:3px solid var(--amber-deep);
    border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .1s;
  }
  .cmd-btn:hover{background:#2A3550}
  .cmd-btn:active,.cmd-btn.flash{transform:translateY(2px);border-bottom-width:1px;background:#3A4664}
  .cmd-btn .kbd{
    font-family:var(--mono);font-size:11px;color:var(--amber);
    background:rgba(255,177,61,.12);border-radius:3px;padding:1px 5px;margin-left:6px;
  }

  .prog-label{font-family:var(--mono);font-size:12px;color:var(--ink-dim);margin:12px 0 6px;text-align:center}
  .program{
    min-height:56px;background:var(--bg);border:1px dashed var(--line);border-radius:10px;
    padding:8px;display:flex;flex-wrap:wrap;gap:2px;align-items:center;justify-content:center;
  }
  .chip{
    font-size:13px;font-weight:700;background:var(--amber);color:#12161F;
    border-radius:6px;padding:8px 10px;cursor:pointer;user-select:none;
    border:none;font-family:var(--sans);
  }
  .chip:hover{background:#FFC670}
  .chip.static{cursor:pointer;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);margin:0 3px}
  .chip.static:hover{border-color:var(--amber)}
  .chip.static .no{font-family:var(--mono);color:var(--amber);margin-right:2px}
  .chip.running{outline:3px solid var(--ok);background:#FFD79A}
  .chip.static.wrongpick{border-color:var(--err);color:var(--err);animation:shake .3s}
  .chip.found{outline:2px solid var(--amber);box-shadow:0 0 10px rgba(255,177,61,.5)}
  .chip.fixed{background:var(--ok);color:#12161F;border-color:var(--ok)}
  .slot{
    width:14px;height:36px;border-radius:6px;cursor:pointer;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;color:transparent;transition:all .1s;
  }
  .slot::before{content:"＋"}
  .slot:hover{background:rgba(255,177,61,.18);color:var(--amber)}
  .slot.sel{
    background:rgba(255,177,61,.28);color:var(--amber);
    outline:1px dashed var(--amber);animation:blink 1s infinite;
  }
  @keyframes blink{50%{outline-color:transparent}}
  .prog-count{font-family:var(--mono);font-size:12px;color:var(--ink-dim);text-align:center;margin-top:6px}
  .prog-count.over{color:var(--err)}

  .run-row{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  button.main{
    font-family:var(--sans);font-size:15px;font-weight:700;
    background:var(--amber);color:#12161F;border:none;border-radius:8px;
    padding:12px 26px;cursor:pointer;transition:transform .1s, box-shadow .2s;
  }
  button.main:hover{box-shadow:0 0 16px rgba(255,177,61,.5)}
  button.main:active{transform:scale(.97)}
  button.main:disabled{opacity:.4;cursor:default;box-shadow:none}
  button.ghost{
    background:transparent;color:var(--amber);border:1px solid var(--line);
    border-radius:8px;padding:12px 18px;font-size:14px;cursor:pointer;font-family:var(--sans);
  }
  button.ghost:hover{border-color:var(--amber)}
  button.big{width:100%;padding:15px;font-size:17px;margin-top:10px}

  .fb{margin-top:14px;font-size:14px;min-height:22px;text-align:center;line-height:1.6}
  .fb.ok{color:var(--ok)} .fb.no{color:var(--err)}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  .hint-box{margin-top:16px;border-top:1px dashed var(--line);padding-top:14px;text-align:center}
  .hint-line{margin-top:8px;font-size:14px;color:var(--ink-dim);line-height:1.7;text-align:left}
  .hint-line b{color:var(--amber)}

  .fragment{
    margin-top:18px;padding:16px;border-radius:10px;text-align:center;
    background:rgba(89,217,140,.08);border:1px solid var(--ok);font-size:15px;line-height:1.7;
  }
  .fragment .digit{
    font-family:var(--mono);font-size:34px;font-weight:bold;color:var(--ok);
    letter-spacing:6px;display:block;margin-top:6px;text-shadow:0 0 12px rgba(89,217,140,.6);
  }
  .memo-tip{font-size:13px;color:var(--amber);margin-top:12px;font-family:var(--mono);text-align:center}

  /* 순서 퍼즐 */
  .order-pool{display:grid;gap:10px;margin:16px 0}
  .order-item{
    text-align:left;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:13px 16px;font-size:15px;font-weight:500;cursor:pointer;
    transition:all .15s;font-family:var(--sans);
  }
  .order-item:hover{border-color:var(--amber)}
  .order-item.used{opacity:.25;pointer-events:none}
  .order-seq{
    min-height:50px;background:var(--bg);border:1px dashed var(--line);border-radius:10px;
    padding:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  }
  .order-seq .seq-chip{
    background:var(--amber);color:#12161F;border-radius:6px;padding:7px 11px;
    font-size:13px;font-weight:700;
  }

  /* 키패드 */
  .keypad-display{
    font-family:var(--mono);font-size:40px;letter-spacing:16px;text-align:center;
    background:var(--bg);border:1px solid var(--line);border-radius:10px;
    padding:18px 0 18px 16px;margin:20px 0;color:var(--ok);min-height:80px;
  }
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:0 auto}
  .keypad button{
    font-family:var(--mono);font-size:20px;padding:16px 0;background:var(--panel-2);
    color:var(--ink);border:1px solid var(--line);border-radius:8px;cursor:pointer;
  }
  .keypad button:hover{border-color:var(--amber)}
  .keypad .act{background:var(--amber);color:#12161F;font-family:var(--sans);font-size:14px;font-weight:700}

  .escape-art{font-size:64px;text-align:center;margin:10px 0 20px}
  .stats{font-family:var(--mono);text-align:center;font-size:15px;color:var(--ink-dim);margin-bottom:24px;line-height:2}
  .stats b{color:var(--ok);font-size:22px}
  .center{text-align:center}

  /* 명예의 전당 */
  .board-form{display:flex;gap:10px;margin:18px 0 6px}
  .board-form input{
    flex:1;font-family:var(--mono);font-size:16px;background:var(--bg);
    color:var(--ink);border:1px solid var(--line);border-radius:8px;
    padding:12px 14px;outline:none;min-width:0;
  }
  .board-form input:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(255,177,61,.2)}
  .board{margin:16px 0;text-align:left}
  .board-row{
    display:flex;align-items:center;gap:12px;padding:11px 14px;
    border-bottom:1px solid var(--line);font-size:15px;
  }
  .board-row .rank{font-family:var(--mono);color:var(--amber);width:40px;font-weight:bold;text-align:center}
  .board-row .cl{font-family:var(--mono);color:var(--ink-dim);width:50px;text-align:center;flex-shrink:0}
  .board-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .board-row .tm{font-family:var(--mono);color:var(--ok)}
  .board-row.top1{background:rgba(255,177,61,.07);border-radius:8px}
  .board-row.head{border-bottom:1px solid var(--amber)}
  .board-row.head span{color:var(--amber);font-family:var(--sans);font-size:12px;font-weight:700}

  .keyhelp{
    font-family:var(--mono);font-size:12px;color:var(--ink-dim);
    text-align:center;margin-top:10px;line-height:1.8;
  }
  .keyhelp b{color:var(--amber)}

  /* 연속 실패 잠금 오버레이 */
  #lockOverlay{
    position:fixed;inset:0;background:rgba(18,22,31,.9);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:99;text-align:center;padding:20px;
  }
  #lockOverlay .big{font-size:60px;margin-bottom:14px}
  #lockOverlay h3{color:var(--err);font-size:21px;margin-bottom:10px}
  #lockOverlay p{color:var(--ink-dim);font-size:15px;line-height:1.7}
  #lockOverlay .cnt{font-family:var(--mono);font-size:52px;color:var(--amber);margin-top:12px;font-weight:bold}

  @media (max-width:520px){
    .cell{width:32px;height:32px;font-size:15px}
    .bot{width:24px;height:24px;font-size:13px}
    h1{font-size:22px} h2{font-size:17px}
    .card{padding:20px 16px}
    .keypad-display{font-size:30px;letter-spacing:10px}
  }
</style>
</head>
<body>
<div class="frame">
  <div class="hud">
    <span>MISSION: <b>로봇 연구소 탈출</b></span>
    <span>⏱ <span id="timer">00:00.000</span></span>
  </div>
  <div class="trace" id="trace" style="display:none"></div>
  <div id="screen"></div>
</div>

<script>
"use strict";

/* ===== 명예의 전당 설정 =====
   구글 앱스 스크립트 '웹 앱' 배포 URL을 아래 따옴표 안에 붙여넣으세요.
   ※ 정보실 방탈출과 기록이 섞이지 않도록, 반드시 '새 스프레드시트'로 새로 배포한 URL을 쓰세요.
   비워 두면 명예의 전당 기능이 자동으로 숨겨지고 게임만 실행됩니다. */
const SCOREBOARD_URL = "https://script.google.com/macros/s/AKfycbw6cVQCYYQviPFw02MpgJCqckXoP0MLQd-ZLtPzJSdPoskgtjgR8NaqLDZOaOKa7OYMhw/exec";

/* ===== 설정값 (필요 시 숫자만 바꾸면 됩니다) ===== */
const HINT_PENALTY   = 10;   // 힌트 1개당 기록에 추가되는 초
const MIN_SUBMIT_SEC = 15;   // 이 시간(초) 미만의 기록은 부정 사용으로 보고 제출 안 함
const STAGE_COUNT    = 7;    // 총 관문 수

/* ================= 공통 유틸 ================= */
const DIRS = [[-1,0],[0,1],[1,0],[0,-1]];       // 북 동 남 서
const ARROWS = ["▲","▶","▼","◀"];
const CMD_LABEL = {F:"⬆ 앞으로", F2:"⬆ 앞으로 ×2", F3:"⬆ 앞으로 ×3", L:"⟲ 왼쪽 회전", R:"⟳ 오른쪽 회전"};

const $screen = document.getElementById("screen");
const $trace  = document.getElementById("trace");
const $timer  = document.getElementById("timer");

let stageIdx = -1;
let stages = [];                 // 이번 판에 출제된 관문들
let totalHints = 0, totalFails = 0, hintUsed = 0;
let penaltySecs = 0;
let startTime = null, timerId = null;
let keypadBuf = "";
let playerName = "", playerClass = "";
let doorCode = "", fragments = [];

function rnd(n){ return Math.floor(Math.random()*n); }
function pick(a){ return a[rnd(a.length)]; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=rnd(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ const d=document.createElement("div"); d.textContent=String(s); return d.innerHTML; }

/* 기록 포맷: 분:초.소수3자리 (예: 03:24.718) */
function fmt(ms){
  const t = Math.max(0, ms)/1000;
  const m = Math.floor(t/60);
  const s = t - m*60;
  return String(m).padStart(2,"0") + ":" + (s<10?"0":"") + s.toFixed(3);
}
function startTimer(){
  startTime = Date.now();
  timerId = setInterval(()=>{ $timer.textContent = fmt(Date.now()-startTime + penaltySecs*1000); }, 16);
}
function renderTrace(){
  $trace.style.display = "flex";
  let html = "";
  for(let i=0;i<STAGE_COUNT;i++){
    const cls = i<stageIdx ? "done" : (i===stageIdx ? "now" : "");
    const click = i<stageIdx ? ` onclick="peekFragment(${i})" title="관문 ${i+1} 코드 조각 다시 보기"` : "";
    html += `<div class="node ${cls}"${click}></div><div class="wire ${i<stageIdx?"done":""}"></div>`;
  }
  html += `<div class="door-node">${stageIdx>=STAGE_COUNT?"🔓":"🔒"}</div>`;
  $trace.innerHTML = html;
}

/* 통과한 관문의 코드 조각 다시 보기 */
function peekFragment(i){
  const st = stages[i];
  if(!st) return;
  const old = document.getElementById("peekOverlay");
  if(old) old.remove();
  const body = st.fragment
    ? `이 관문에서 얻은 <strong>도어 코드 조각</strong><span class="digit">${st.fragment}</span>`
    : `이 관문에서는 코드 조각이 나오지 않았다.<br>조각은 <strong>관문 2 · 3 · 5 · 6</strong>에서 나온다.`;
  const ov = document.createElement("div");
  ov.id = "peekOverlay";
  ov.innerHTML = `
    <div class="peek-card">
      <div class="unit-tag">관문 ${i+1} · ${st.tag}</div>
      <p style="margin-top:10px">${body}</p>
      <button class="ghost" style="margin-top:14px" onclick="document.getElementById('peekOverlay').remove()">닫기</button>
    </div>`;
  ov.addEventListener("click", e=>{ if(e.target===ov) ov.remove(); });
  document.body.appendChild(ov);
}
function setFb(kind,msg){
  const fb = document.getElementById("fb");
  if(!fb) return;
  fb.className = "fb "+kind; fb.textContent = msg;
}

/* ================= 미로 생성 엔진 =================
   무작위 미로를 만들고 시작→깃발 경로 길이를 검증한다.
   같은 유형이라도 매 판 완전히 새로운 미로가 나온다. */
function buildMaze(rows, cols, minLen, maxLen){
  for(let attempt=0; attempt<400; attempt++){
    const g = [];
    for(let r=0;r<rows;r++) g.push(new Array(cols).fill("#"));

    // DFS로 통로 파기 (홀수 좌표 기준)
    const stack = [[1,1]];
    g[1][1] = ".";
    while(stack.length){
      const top = stack[stack.length-1];
      const r = top[0], c = top[1];
      const opts = [];
      for(const d of DIRS){
        const nr=r+d[0]*2, nc=c+d[1]*2;
        if(nr>0 && nr<rows-1 && nc>0 && nc<cols-1 && g[nr][nc]==="#") opts.push(d);
      }
      if(opts.length===0){ stack.pop(); continue; }
      const d = pick(opts);
      g[r+d[0]][c+d[1]] = ".";
      g[r+d[0]*2][c+d[1]*2] = ".";
      stack.push([r+d[0]*2, c+d[1]*2]);
    }
    // 벽 몇 개를 더 뚫어 갈림길을 만든다
    const extra = Math.floor(rows*cols/14);
    for(let i=0;i<extra;i++){
      const r = 1+rnd(rows-2), c = 1+rnd(cols-2);
      g[r][c] = ".";
    }

    // 시작점 선택 후 BFS로 거리 계산
    const open = [];
    for(let r=1;r<rows-1;r++) for(let c=1;c<cols-1;c++) if(g[r][c]===".") open.push([r,c]);
    if(open.length < 6) continue;
    const s = pick(open);
    const dist = {}; dist[s.join(",")] = 0;
    const par = {};
    const q = [s];
    while(q.length){
      const cur = q.shift();
      const cd = dist[cur.join(",")];
      for(const d of DIRS){
        const nr=cur[0]+d[0], nc=cur[1]+d[1];
        if(nr<0||nr>=rows||nc<0||nc>=cols||g[nr][nc]!==".") continue;
        const k = nr+","+nc;
        if(dist[k]!==undefined) continue;
        dist[k] = cd + 1;
        par[k] = cur[0]+","+cur[1];
        q.push([nr,nc]);
      }
    }
    const cands = Object.keys(dist).filter(k => dist[k]>=minLen && dist[k]<=maxLen);
    if(!cands.length) continue;
    const goal = pick(cands).split(",").map(Number);

    // 최단 경로 역추적: 시작 방향은 이 경로의 첫 이동 방향
    const startKey = s.join(",");
    const path = [];
    let bk = goal[0]+","+goal[1];
    while(bk !== startKey){ path.push(bk.split(",").map(Number)); bk = par[bk]; }
    path.push([s[0], s[1]]);
    path.reverse();
    const fdr = path[1][0]-s[0], fdc = path[1][1]-s[1];
    let sd = 0;
    for(let d=0; d<4; d++){
      if(DIRS[d][0]===fdr && DIRS[d][1]===fdc){ sd = d; break; }
    }
    g[goal[0]][goal[1]] = "G";
    return { grid:g, start:s, goal:goal, startDir:sd, path:path };
  }
  return null;
}

/* 최단 셀 경로를 F/L/R 명령열로 변환 — 시작 방향이 경로의 첫걸음이므로 항상 '앞으로'로 시작 */
function pathCmds(M){
  const cmds = [];
  let d = M.startDir;
  for(let i=1; i<M.path.length; i++){
    const dr = M.path[i][0]-M.path[i-1][0], dc = M.path[i][1]-M.path[i-1][1];
    let nd = 0;
    for(let k=0;k<4;k++){ if(DIRS[k][0]===dr && DIRS[k][1]===dc){ nd=k; break; } }
    const diff = (nd - d + 4) % 4;
    if(diff===1) cmds.push("R");
    else if(diff===3) cmds.push("L");
    else if(diff===2) cmds.push("R","R");
    cmds.push("F");
    d = nd;
  }
  return cmds;
}

/* 명령열을 실행해 결과(goal/crash/end)를 반환 */
function simulateCmds(M, cmds){
  let r=M.start[0], c=M.start[1], d=M.startDir;
  for(const op of cmds){
    if(op==="L") d=(d+3)%4;
    else if(op==="R") d=(d+1)%4;
    else{
      const nr=r+DIRS[d][0], nc=c+DIRS[d][1];
      if(!M.grid[nr] || M.grid[nr][nc]==="#") return "crash";
      r=nr; c=nc;
    }
    if(M.grid[r][c]==="G") return "goal";
  }
  return "end";
}

/* 명령열을 사람이 읽는 힌트 문장으로 */
function cmdsToText(cmds){
  const parts = []; let i=0;
  while(i<cmds.length){
    if(cmds[i]==="F"){
      let n=0; while(cmds[i]==="F"){ n++; i++; }
      parts.push("앞으로 "+n+"칸");
    } else {
      parts.push(cmds[i]==="L" ? "왼쪽 회전" : "오른쪽 회전");
      i++;
    }
  }
  return parts.join(" → ");
}

/* ================= 관문 생성기 (유형별) ================= */

/* [유형 A] 순차 미로 — 난이도별 크기·경로 길이 */
function makeMazeStage(level){
  const spec = [
    {rows:5, cols:7,  min:4,  max:8},
    {rows:5, cols:9,  min:6,  max:12},
    {rows:7, cols:9,  min:8,  max:16},
    {rows:7, cols:11, min:12, max:22}
  ][level];
  let M = null, cmds = null;
  while(!cmds || cmds.length < 4){
    M = buildMaze(spec.rows, spec.cols, spec.min, spec.max);
    cmds = M ? pathCmds(M) : null;
  }
  return {
    kind:"maze",
    tag:"순차 실행",
    title:"경비 로봇 조종하기",
    story:`유리벽 너머의 <strong>경비 로봇</strong>을 조종해 깃발까지 보내야 다음 문이 열린다.<br>
    명령 블록을 눌러 프로그램을 조립한 뒤 <strong>▶ 실행</strong>을 누르자.
    로봇은 조립한 순서 그대로 움직이며, <strong>벽에 부딪히면 처음부터</strong>다.`,
    maze:M, cmds:["F","L","R"], maxLen: cmds.length + 6,
    hints:[
      "로봇이 바라보는 방향(화살표)을 기준으로 '앞으로'가 실행된다. 갈림길마다 회전을 미리 계획하자.",
      "정답 경로: " + cmdsToText(cmds)
    ]
  };
}

/* [유형 B] 추상화 — 묶음 블록(×2,×3)을 써야만 통과 가능한 블록 수 제한 (난이도별) */
function makeCompactStage(diff){
  const spec = diff==="hard"
    ? {rows:7, cols:13, min:18, max:30, cmin:16}
    : {rows:7, cols:11, min:14, max:24, cmin:12};
  let M = null, cmds = null;
  while(!cmds || cmds.length < spec.cmin){
    M = buildMaze(spec.rows, spec.cols, spec.min, spec.max);
    cmds = M ? pathCmds(M) : null;
  }
  // 묶음 블록 사용 시 필요한 최소 블록 수: 연속 F구간마다 ceil(n/3)
  let need = 0, i = 0;
  while(i < cmds.length){
    if(cmds[i]==="F"){
      let n=0; while(cmds[i]==="F"){ n++; i++; }
      need += Math.ceil(n/3);
    } else { need++; i++; }
  }
  return {
    kind:"maze",
    tag:"추상화 · 묶음 명령",
    title:"배터리 절약 모드",
    story:`로봇의 배터리가 얼마 남지 않아 <strong>명령 블록을 최대 ${need}개</strong>까지만 쓸 수 있다.<br>
    '앞으로'만으로는 절대 부족하다. 같은 동작을 하나로 묶은 <strong>×2, ×3 블록</strong>을 활용하자.`,
    maze:M, cmds:["F","F2","F3","L","R"], maxLen: need,
    hints:[
      `'앞으로'만 쓰면 블록이 ${cmds.length}개 필요하다. 연속으로 직진하는 구간을 ×3, ×2로 묶어 보자.`,
      "정답 경로: " + cmdsToText(cmds)
    ]
  };
}

/* [유형 C] 디버깅 — 정답 경로에서 명령 하나를 고장 낸다
   프로그램 길이: 초반(중) 5블록 이내, 후반(상) 6~10블록. 어떤 경우에도 10블록 초과 없음 */
function makeDebugStage(diff){
  const spec = diff==="hard"
    ? {rows:7, cols:9, min:5, max:8, pmin:6, pmax:10}
    : {rows:5, cols:7, min:3, max:4, pmin:4, pmax:5};
  while(true){
    const M = buildMaze(spec.rows, spec.cols, spec.min, spec.max);
    if(!M) continue;
    const cmds = pathCmds(M);
    if(!cmds || cmds.length < spec.pmin || cmds.length > spec.pmax) continue;

    // 회전 명령 하나를 반대로 뒤집는다 (회전이 없으면 F를 회전으로)
    const turnIdx = [];
    cmds.forEach((c,i)=>{ if(c!=="F") turnIdx.push(i); });
    let wrongIndex, correctCmd, brokenCmd;
    if(turnIdx.length){
      wrongIndex = pick(turnIdx);
      correctCmd = cmds[wrongIndex];
      brokenCmd  = correctCmd==="L" ? "R" : "L";
    } else {
      wrongIndex = rnd(cmds.length);
      correctCmd = "F";
      brokenCmd  = pick(["L","R"]);
    }
    const broken = cmds.slice();
    broken[wrongIndex] = brokenCmd;

    // 고장 난 프로그램이 우연히 깃발에 도착해 버리면 다시 생성
    if(simulateCmds(M, broken) === "goal") continue;

    const opts = [correctCmd, brokenCmd==="L"?"R":"L", "F"];
    const fixOptions = shuffle(opts.filter((v,i,a)=>a.indexOf(v)===i && v!==brokenCmd));

    return {
      kind:"debug",
      tag:"디버깅",
      title:"고장 난 프로그램",
      story:`앞서 간 누군가가 프로그램을 남겼지만 <strong>명령 하나가 잘못되어</strong> 로봇이 벽에 부딪힌다.<br>
      ① 프로그램을 <strong>머릿속으로 한 단계씩 실행</strong>해 보고 <strong>잘못된 블록을 클릭</strong>하라.<br>
      ② 그다음 <strong>올바른 블록으로 고치면</strong>, 수리된 프로그램이 실행되어 검증된다.`,
      maze:M, program:broken, wrongIndex:wrongIndex, correctCmd:correctCmd, fixOptions:fixOptions,
      hints:[
        "로봇의 시작 방향부터 확인하고, 손가락으로 칸을 짚으며 명령을 하나씩 따라가 보자.",
        `${wrongIndex+1}번째 명령을 실행하는 순간부터 경로가 어긋난다. 그 자리에서 로봇은 어느 쪽으로 가야 했을까?`
      ]
    };
  }
}

/* [유형 D] 조건·반복 시뮬레이션 — 규칙을 N회 반복한 뒤 도착 칸 예측
   반복 횟수: 초반(중) 5회 이내, 후반(상) 6~10회 */
function makeConditionStage(diff){
  const spec = diff==="hard"
    ? {rows:5, cols:9, nBase:6, nRange:5, minTurns:2}   // 6~10회
    : {rows:5, cols:7, nBase:4, nRange:2, minTurns:1};  // 4~5회
  while(true){
    const M = buildMaze(spec.rows, spec.cols, 3, 10);
    if(!M) continue;
    const N = spec.nBase + rnd(spec.nRange);
    // 규칙: 앞이 벽이면 오른쪽 회전(제자리), 아니면 전진
    let r=M.start[0], c=M.start[1], d=M.startDir, turns=0;
    for(let k=0;k<N;k++){
      const nr=r+DIRS[d][0], nc=c+DIRS[d][1];
      if(!M.grid[nr] || M.grid[nr][nc]==="#"){ d=(d+1)%4; turns++; }
      else { r=nr; c=nc; }
    }
    if(turns < spec.minTurns) continue;               // 너무 단순하면 다시
    if(r===M.start[0] && c===M.start[1]) continue;    // 제자리면 다시
    M.grid[M.goal[0]][M.goal[1]] = ".";               // 조건 관문에는 깃발이 없다 (혼동 방지)
    return {
      kind:"condition",
      tag:"조건과 반복",
      title:"자율주행 로봇의 도착지 예측",
      story:`이 로봇은 사람이 조종하지 않는다. 아래의 <strong>단 하나의 규칙</strong>을 <strong>${N}번</strong> 반복할 뿐이다.<br>
      ${N}번의 행동이 끝났을 때 <strong>로봇이 서 있을 칸을 클릭</strong>하라.`,
      rule:`매 회, 로봇은 딱 한 가지 행동을 한다:<br>
      ① <strong>앞이 벽이면</strong> → 오른쪽으로 회전만 한다 (제자리)<br>
      ② <strong>앞이 벽이 아니면</strong> → 한 칸 전진한다`,
      maze:M, times:N, answer:[r,c],
      hints:[
        "'회전'도 1회로 센다! 회전한 회에는 전진하지 않는다는 점이 함정이다.",
        "종이에 격자를 그리고 1회부터 하나씩 번호를 매기며 표시해 보자. 벽에 막히는 순간을 놓치지 말 것."
      ]
    };
  }
}

/* [유형 E] 알고리즘 설계 — 규칙을 만족하는 유일한 순서 찾기 */
const ORDER_SETS = [
  {
    title:"탈출 로봇 출동 절차",
    rule:`· 배터리가 없으면 전원을 켤 수 없다<br>· 자가 진단은 전원이 켜진 직후 실행된다<br>· 임무 좌표는 자가 진단을 통과한 후에만 입력할 수 있다<br>· 좌표가 입력되어야 출발할 수 있다`,
    seq:["배터리 장착","전원 켜기","자가 진단","임무 좌표 입력","출발"]
  },
  {
    title:"센서 데이터 처리 절차",
    rule:`· 센서를 연결해야 값을 읽을 수 있다<br>· 읽은 값은 잡음 제거를 거쳐야 한다<br>· 잡음이 제거된 값만 저장할 수 있다<br>· 저장된 값으로만 그래프를 그린다`,
    seq:["센서 연결","값 읽기","잡음 제거","데이터 저장","그래프 출력"]
  },
  {
    title:"자율주행 판단 절차",
    rule:`· 카메라가 켜져야 영상을 얻는다<br>· 영상에서 장애물을 인식한다<br>· 장애물을 인식해야 거리를 계산할 수 있다<br>· 거리를 알아야 제동 여부를 결정한다`,
    seq:["카메라 켜기","영상 획득","장애물 인식","거리 계산","제동 결정"]
  },
  {
    title:"로봇 팔 물건 옮기기",
    rule:`· 물체의 위치를 알아야 팔을 뻗는다<br>· 팔을 뻗어야 집을 수 있다<br>· 집은 뒤에야 들어 올린다<br>· 들어 올린 뒤 목표 위치로 이동한다`,
    seq:["물체 위치 인식","팔 뻗기","집기","들어 올리기","목표로 이동"]
  },
  {
    title:"프로그램 개발 절차",
    rule:`· 무엇을 만들지 정해야 설계할 수 있다<br>· 설계가 있어야 코드를 작성한다<br>· 코드가 있어야 실행해 볼 수 있다<br>· 실행 결과를 보고 오류를 고친다`,
    seq:["문제 정의","알고리즘 설계","코드 작성","실행","디버깅"]
  }
];
function makeOrderStage(){
  const O = pick(ORDER_SETS);
  const shown = O.seq.map((t,i)=>({t:t, i:i}));
  shuffle(shown);
  // 정답: 원본 0,1,2,3,4 순서가 화면에서 몇 번째인지
  const answerView = O.seq.map((_,oi)=>{
    for(let vi=0; vi<shown.length; vi++) if(shown[vi].i===oi) return vi;
  });
  return {
    kind:"order",
    tag:"알고리즘 설계",
    title:O.title,
    story:`절차가 뒤섞여 있다. 아래 <strong>규칙</strong>을 만족하는 유일한 순서대로 단계를 클릭해 완성하라.`,
    rule:O.rule,
    items: shown.map(o=>o.t),
    answer: answerView,
    hints:[
      "가장 먼저 할 수 있는 일은? 아무 조건도 필요 없는 단계를 찾자.",
      "규칙의 '~해야 ~할 수 있다'를 화살표로 이어 보면 한 줄로 정리된다."
    ]
  };
}

/* ================= 이번 판의 7관문 구성 =================
   1~2 난이도 하 · 3~5 난이도 중 · 6~7 난이도 상
   유형 순서는 고정, 내용물은 전부 매 판 새로 생성 */
function buildStages(){
  const s = [
    /* ── 하 (1~2) ── */
    makeMazeStage(0),            // 1. 아주 쉬운 미로 (튜토리얼)
    makeMazeStage(1),            // 2. 쉬운 미로
    /* ── 중 (3~5) ── */
    makeDebugStage("mid"),       // 3. 디버깅 (5블록 이내)
    makeConditionStage("mid"),   // 4. 조건·반복 (4~5회)
    makeCompactStage("mid"),     // 5. 추상화 (블록 제한)
    /* ── 상 (6~7) ── */
    makeDebugStage("hard"),      // 6. 디버깅 (6~10블록)
    makeConditionStage("hard")   // 7. 조건·반복 (6~10회)
  ];
  s.forEach((st,i)=>{ st.level = i<2 ? "하" : (i<5 ? "중" : "상"); });
  return s;
}

/* 도어 코드 조각: 관문 2, 3, 5, 6에서 랜덤 숫자 지급 */
function genFragments(){
  doorCode = ""; fragments = [];
  [1,2,4,5].forEach(i=>{
    const d = String(rnd(10));
    stages[i].fragment = d;
    doorCode += d;
  });
}

        <input type="text" id="pname0" maxlength="20" placeholder="닉네임" autocomplete="off">
      </div>
      <div class="fb" id="fb"></div>
      <button class="main big" onclick="startGame()">▶ 탈출 시작</button>
      ${SCOREBOARD_URL ? `<button class="ghost big" onclick="showBoard(true)">🏆 명예의 전당 보기</button>` : ""}
    </div>`;
  const c = document.getElementById("pcls0"), n = document.getElementById("pname0");
  c.focus();
  c.addEventListener("input", ()=>{ c.value = c.value.replace(/[^0-9]/g,""); });
  c.addEventListener("keydown", e=>{ if(e.key==="Enter") n.focus(); });
  n.addEventListener("keydown", e=>{ if(e.key==="Enter") startGame(); });
}

let sessionToken = null;
async function startGame(){
  const cIn = document.getElementById("pcls0"), nIn = document.getElementById("pname0");
  const cls = cIn.value.trim(), name = nIn.value.trim();
  if(!/^[0-9]+$/.test(cls)){ setFb("no","반은 숫자만 입력하자! (예: 3)"); cIn.focus(); return; }
  if(!name){ setFb("no","닉네임을 먼저 입력하자!"); nIn.focus(); return; }
  playerClass = cls; playerName = name;
  penaltySecs = 0; totalHints = 0; totalFails = 0;
  sessionToken = null;

  /* 서버가 시작 시각을 직접 기록한다 — 기록은 서버 시계로만 측정됨 */
  if(SCOREBOARD_URL){
    setFb("", "서버와 시간 동기화 중...");
    try{
      const res = await fetch(SCOREBOARD_URL, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({ action:"start" })
      });
      const data = await res.json();
      if(data && data.ok) sessionToken = data.token;
    }catch(err){ sessionToken = null; }
    if(!sessionToken){
      setFb("no","⚠ 서버 연결 실패 — 게임은 할 수 있지만 이번 판 기록은 등록되지 않는다.");
    }
  }

  setTimeout(()=>{
    stages = buildStages();
    genFragments();
    stageIdx = 0;
    startTimer();
    showStage();
  }, sessionToken===null && SCOREBOARD_URL ? 1200 : 30);
}

function showStage(){
  hintUsed = 0;
  renderTrace();
  const st = stages[stageIdx];
  if(st.kind==="maze")           showMaze(st);
  else if(st.kind==="debug")     showDebug(st);
  else if(st.kind==="condition") showCondition(st);
  else if(st.kind==="order")     showOrder(st);
}

/* ================= 미로 렌더링 ================= */
function mazeHTML(grid, cellExtra){
  const rows = grid.length, cols = grid[0].length;
  const w = window.innerWidth < 520 ? 32 : 42;
  let html = `<div class="maze" style="grid-template-columns:repeat(${cols},${w}px)" id="maze">`;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const ch = grid[r][c];
    const cls = ch==="#" ? "wall" : (ch==="G" ? "goal" : "");
    const extra = cellExtra ? cellExtra(r,c,ch) : "";
    html += `<div class="cell ${cls}" id="cell-${r}-${c}" ${extra}></div>`;
  }
  return html + `</div>`;
}
function placeBot(r,c,dir,crash){
  document.querySelectorAll(".bot").forEach(b=>b.remove());
  const cell = document.getElementById(`cell-${r}-${c}`);
  if(!cell) return;
  const bot = document.createElement("div");
  bot.className = "bot"+(crash?" crash":"");
  bot.textContent = ARROWS[dir];
  cell.appendChild(bot);
}

/* ================= 유형 A/B: 조작형 미로 ================= */
let M = null, program = [], insertAt = null, running = false;

function showMaze(st){
  M = st; program = []; insertAt = null; running = false;
  const keyOf = { F:"↑", L:"←", R:"→" };
  const cmdBtns = st.cmds.map(c=>{
    const k = keyOf[c] ? `<span class="kbd">${keyOf[c]}</span>` : "";
    return `<button class="cmd-btn" id="cb-${c}" onclick="addCmd('${c}')">${CMD_LABEL[c]}${k}</button>`;
  }).join("");

  $screen.innerHTML = `
    <div class="card">
      <div class="unit-tag">관문 ${stageIdx+1} / ${STAGE_COUNT} · ${st.tag} · 난이도 ${st.level}</div>
      <h2>${st.title}</h2>
      <p>${st.story}</p>
      <div class="maze-wrap">${mazeHTML(st.maze.grid)}</div>
      <div class="cmd-bar">${cmdBtns}</div>
      <div class="keyhelp">⌨ <b>↑</b> 앞으로 · <b>←</b> 좌회전 · <b>→</b> 우회전 · <b>Enter</b> 실행 · <b>Backspace</b> 마지막 블록 삭제</div>
      <div class="prog-label">내 프로그램 (블록 클릭 = 삭제 · ＋ 클릭 = 그 자리에 삽입)</div>
      <div class="program" id="prog"></div>
      <div class="prog-count" id="pcount"></div>
      <div class="run-row">
        <button class="main" id="runBtn" onclick="runProgram()">▶ 실행</button>
        <button class="ghost" onclick="clearProgram()">전체 지우기</button>
      </div>
      <div class="fb" id="fb"></div>
      <div class="hint-box">
        <button class="ghost" onclick="useHint()">💡 힌트 보기 (기록 +${HINT_PENALTY}초)</button>
        <div id="hints"></div>
      </div>
    </div>`;
  placeBot(st.maze.start[0], st.maze.start[1], st.maze.startDir);
  drawProgram();
}
function flashBtn(c){
  const b = document.getElementById("cb-"+c);
  if(!b) return;
  b.classList.add("flash");
  setTimeout(()=>b.classList.remove("flash"), 120);
}
function addCmd(c){
  if(running) return;
  if(program.length >= M.maxLen){ setFb("no", `블록은 최대 ${M.maxLen}개까지만 쓸 수 있다!`); return; }
  const pos = (insertAt===null || insertAt>program.length) ? program.length : insertAt;
  program.splice(pos, 0, c);
  if(insertAt!==null) insertAt = pos + 1;
  drawProgram(); setFb("","");
}
function removeCmd(i){
  if(running) return;
  program.splice(i,1);
  if(insertAt!==null){
    if(insertAt > i) insertAt--;
    if(insertAt > program.length) insertAt = null;
  }
  drawProgram();
}
function pickSlot(i){ if(running) return; insertAt = (insertAt===i) ? null : i; drawProgram(); }
function clearProgram(){ if(running) return; program=[]; insertAt=null; drawProgram(); setFb("",""); }
function drawProgram(){
  const el = document.getElementById("prog");
  if(!el) return;
  if(program.length===0){
    el.innerHTML = `<span style="color:var(--ink-dim);font-size:13px">블록 버튼이나 방향키(↑ ← →)로 명령을 넣으세요</span>`;
  } else {
    let html = "";
    for(let i=0;i<=program.length;i++){
      html += `<div class="slot${insertAt===i?" sel":""}" onclick="pickSlot(${i})"></div>`;
      if(i < program.length)
        html += `<button class="chip" id="chip-${i}" onclick="removeCmd(${i})">${CMD_LABEL[program[i]]} ✕</button>`;
    }
    el.innerHTML = html;
  }
  const pc = document.getElementById("pcount");
  pc.textContent = `${program.length} / ${M.maxLen} 블록` + (insertAt!==null ? ` · 삽입 위치: ${insertAt+1}번째 자리` : "");
  pc.className = "prog-count" + (program.length>=M.maxLen ? " over" : "");
}

function runProgram(){
  if(running) return;
  if(program.length===0){ setFb("no","블록을 먼저 조립하자!"); return; }
  const steps = [];
  program.forEach((c,i)=>{
    if(c==="F")       steps.push({op:"F",chip:i});
    else if(c==="F2") steps.push({op:"F",chip:i},{op:"F",chip:i});
    else if(c==="F3") steps.push({op:"F",chip:i},{op:"F",chip:i},{op:"F",chip:i});
    else              steps.push({op:c,chip:i});
  });
  running = true;
  document.getElementById("runBtn").disabled = true;
  setFb("","");
  let r=M.maze.start[0], c=M.maze.start[1], dir=M.maze.startDir, k=0;

  const iv = setInterval(()=>{
    document.querySelectorAll(".chip").forEach(ch=>ch.classList.remove("running"));
    if(k >= steps.length){ clearInterval(iv); finishRun(false); return; }
    const stp = steps[k];
    const chipEl = document.getElementById("chip-"+stp.chip);
    if(chipEl) chipEl.classList.add("running");

    if(stp.op==="L") dir=(dir+3)%4;
    else if(stp.op==="R") dir=(dir+1)%4;
    else{
      const nr=r+DIRS[dir][0], nc=c+DIRS[dir][1];
      if(M.maze.grid[nr][nc]==="#"){
        clearInterval(iv);
        placeBot(r,c,dir,true);
        registerFail();
        setTimeout(()=>finishRun("crash"), 650);
        return;
      }
      r=nr; c=nc;
    }
    placeBot(r,c,dir);
    if(M.maze.grid[r][c]==="G"){ clearInterval(iv); setTimeout(()=>stageClear(M.fragment), 400); return; }
    k++;
  }, 300);
}
function finishRun(crash){
  running = false;
  const b = document.getElementById("runBtn");
  if(b) b.disabled = false;
  document.querySelectorAll(".chip").forEach(ch=>ch.classList.remove("running"));
  placeBot(M.maze.start[0], M.maze.start[1], M.maze.startDir);
  if(crash==="crash") setFb("no","💥 쿵! 벽에 부딪혔다. 프로그램을 수정해서 다시 도전하자.");
  else { registerFail(); setFb("no","🔋 프로그램이 끝났지만 깃발에 도착하지 못했다."); }
}

/* ================= 유형 C: 디버깅 ================= */
let debugFound = false;
function showDebug(st){
  debugFound = false;
  const chips = st.program.map((c,i)=>
    `<button class="chip static" id="dchip-${i}" onclick="pickDebug(${i})"><span class="no">${i+1}</span>${CMD_LABEL[c]}</button>`).join("");
  $screen.innerHTML = `
    <div class="card">
      <div class="unit-tag">관문 ${stageIdx+1} / ${STAGE_COUNT} · ${st.tag} · 난이도 ${st.level}</div>
      <h2>${st.title}</h2>
      <p>${st.story}</p>
      <div class="maze-wrap">${mazeHTML(st.maze.grid)}</div>
      <div class="prog-label">남겨진 프로그램 — 잘못된 블록을 클릭!</div>
      <div class="program">${chips}</div>
      <div id="fixArea"></div>
      <div class="fb" id="fb"></div>
      <div class="hint-box">
        <button class="ghost" onclick="useHint()">💡 힌트 보기 (기록 +${HINT_PENALTY}초)</button>
        <div id="hints"></div>
      </div>
    </div>`;

}
function pickDebug(i){
  const st = stages[stageIdx];
  if(debugFound) return;
  if(i === st.wrongIndex){
    debugFound = true;
    document.getElementById("dchip-"+i).classList.add("found");
    setFb("ok", `✔ 찾았다! ${i+1}번 블록이 문제다.`);
    const btns = st.fixOptions.map(c=>`<button class="cmd-btn" onclick="fixDebug('${c}')">${CMD_LABEL[c]}</button>`).join(" ");
    document.getElementById("fixArea").innerHTML =
      `<div class="rulebox" style="text-align:center">🔧 <strong>${i+1}번 블록</strong>을 어떤 블록으로 고쳐야 할까?<br><br>${btns}</div>`;
  } else {
    registerFail();
    const el = document.getElementById("dchip-"+i);
    el.classList.add("wrongpick");
    setTimeout(()=>el.classList.remove("wrongpick"), 400);
    setFb("no", `${i+1}번 블록은 정상이다. 로봇의 방향을 다시 따라가 보자.`);
  }
}
function fixDebug(cmd){
  const st = stages[stageIdx];
  if(cmd !== st.correctCmd){ registerFail(); setFb("no","⚠ 그 블록으로는 여전히 깃발에 갈 수 없다. 다시 생각해 보자."); return; }
  const chip = document.getElementById("dchip-"+st.wrongIndex);
  chip.classList.remove("found"); chip.classList.add("fixed");
  chip.innerHTML = `<span class="no">${st.wrongIndex+1}</span>${CMD_LABEL[cmd]}`;
  document.getElementById("fixArea").innerHTML = "";
  setFb("ok","🔧 수리 완료! 프로그램을 실행해 검증한다...");
  const fixed = st.program.slice(); fixed[st.wrongIndex] = cmd;
  let r=st.maze.start[0], c=st.maze.start[1], dir=st.maze.startDir, k=0;
  const iv = setInterval(()=>{
    document.querySelectorAll(".chip").forEach(ch=>ch.classList.remove("running"));
    if(k >= fixed.length){ clearInterval(iv); return; }
    const chipEl = document.getElementById("dchip-"+k);
    if(chipEl) chipEl.classList.add("running");
    const op = fixed[k];
    if(op==="L") dir=(dir+3)%4;
    else if(op==="R") dir=(dir+1)%4;
    else { r+=DIRS[dir][0]; c+=DIRS[dir][1]; }
    placeBot(r,c,dir);
    if(st.maze.grid[r][c]==="G"){ clearInterval(iv); setTimeout(()=>stageClear(st.fragment), 450); return; }
    k++;
  }, 300);
}

function pickOrder(i){

  if(orderPicked.length === st.answer.length) setTimeout(()=>stageClear(st.fragment), 500);

  orderPicked = [];
  document.querySelectorAll(".order-item").forEach(el=>el.classList.remove("used"));
  document.getElementById("oseq").innerHTML = `<span style="color:var(--ink-dim);font-size:13px">첫 번째 단계부터 클릭하세요</span>`;
}

/* ================= 힌트 ================= */
function useHint(){
  const st = stages[stageIdx];
  if(hintUsed >= st.hints.length) return;
  totalHints++; penaltySecs += HINT_PENALTY;
  document.getElementById("hints").innerHTML +=
    `<div class="hint-line"><b>HINT ${hintUsed+1} (⏱ 기록 +${HINT_PENALTY}초)</b> — ${st.hints[hintUsed]}</div>`;
  hintUsed++;
}

/* ================= 키보드 조작 (방향키) ================= */
document.addEventListener("keydown", e=>{
  if(locked) return;
  if(document.activeElement && document.activeElement.tagName==="INPUT") return;
  /* 최종 도어: 숫자키로 코드 입력 */
  if(document.getElementById("kd")){
    if(/^[0-9]$/.test(e.key)){ e.preventDefault(); kp(e.key); return; }
    if(e.key==="Backspace"){ e.preventDefault(); kpBack(); return; }
    if(e.key==="Enter"){ e.preventDefault(); kpEnter(); return; }
    return;
  }
  const st = stages[stageIdx];
  if(!st || st.kind!=="maze" || running) return;
  const map = {ArrowUp:"F", ArrowLeft:"L", ArrowRight:"R"};
  if(map[e.key] && st.cmds.includes(map[e.key])){
    e.preventDefault(); addCmd(map[e.key]); flashBtn(map[e.key]);
  } else if(e.key==="Enter"){
    e.preventDefault(); runProgram();
  } else if(e.key==="Backspace"){
    e.preventDefault();
    if(program.length) removeCmd(program.length-1);
  }
});

/* ================= 개발자 도구 억제 =================
   완전 차단은 기술적으로 불가능하지만(브라우저 메뉴로 열 수 있음),
   기록은 어차피 서버가 측정하므로 코드를 고쳐도 조작할 수 없다. */
document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("keydown", e=>{
  const k = (e.key || "").toUpperCase();
  if(e.key === "F12" ||
     (e.ctrlKey && e.shiftKey && (k==="I" || k==="J" || k==="C")) ||
     (e.ctrlKey && k==="U")){
    e.preventDefault();
    e.stopPropagation();
  }
}, true);

/* ================= 연속 실패 잠금 =================
   FAIL_WINDOW초 안에 FAIL_LIMIT회 이상 틀리면 LOCK_SEC초 동안 잠금.
   타이머는 계속 흐르므로 무작정 찍기가 손해가 된다. */
const FAIL_LIMIT = 10, FAIL_WINDOW = 10, LOCK_SEC = 5;
let failTimes = [], locked = false;

function registerFail(){
  totalFails++;
  const now = Date.now();
  failTimes.push(now);
  failTimes = failTimes.filter(t => now - t <= FAIL_WINDOW*1000);
  if(!locked && failTimes.length >= FAIL_LIMIT) triggerLock();
}
function triggerLock(){
  locked = true;
  failTimes = [];
  const ov = document.createElement("div");
  ov.id = "lockOverlay";
  ov.innerHTML = `
    <div class="big">🚫</div>
    <h3>시도가 너무 많다!</h3>
    <p>잠시 멈추고 생각할 시간.<br>무작정 찍는 것보다 머릿속 시뮬레이션이 훨씬 빠르다.<br>(타이머는 계속 흐르는 중…)</p>
    <div class="cnt" id="lockCnt">${LOCK_SEC}</div>`;
  document.body.appendChild(ov);
  let left = LOCK_SEC;
  const iv = setInterval(()=>{
    left--;
    const c = document.getElementById("lockCnt");
    if(c) c.textContent = left;
    if(left <= 0){
      clearInterval(iv);
      ov.remove();
      locked = false;
    }
  }, 1000);
}

/* ================= 관문 클리어 ================= */
function stageClear(fragment){
  if(fragment) fragments.push(fragment);
  let extra = "";
  if(fragment){
    extra = `
      <div class="fragment">
        🔑 관문이 열리며 <strong>도어 코드 조각</strong>이 나왔다! (${fragments.length}번째 조각)
        <span class="digit">${fragment}</span>
      </div>
      <div class="memo-tip">※ 위 진행도의 초록 점을 누르면 얻은 조각을 언제든 다시 볼 수 있다.</div>`;
  }
  const isLast = stageIdx+1 >= STAGE_COUNT;
  $screen.innerHTML = `
    <div class="card center">
      <div class="unit-tag">CLEAR</div>
      <h2>✔ 관문 ${stageIdx+1} 통과!</h2>
      <p>경비 AI가 감탄한 듯 잠시 조용해졌다.</p>
      ${extra}
      <button class="main big" onclick="nextStage()">${isLast ? "🚪 최종 출입문으로" : "다음 관문으로 →"}</button>
    </div>`;
  stageIdx++;
  renderTrace();
}
function nextStage(){ if(stageIdx < STAGE_COUNT) showStage(); else showDoor(); }

/* ================= 최종 도어 ================= */
function showDoor(){
  keypadBuf = ""; renderTrace();
  $screen.innerHTML = `
    <div class="card">
      <div class="unit-tag">FINAL DOOR</div>
      <h2>🚪 최종 출입문 — 4자리 도어 코드</h2>
      <p>모든 관문을 통과했다. 지금까지 모은 <strong>4개의 코드 조각</strong>을
      <strong>얻은 순서대로</strong> 입력하면 문이 열린다.</p>
      <div class="keypad-display" id="kd">— — — —</div>
      <div class="keypad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="kp('${n}')">${n}</button>`).join("")}
        <button class="act" onclick="kpClear()">지움</button>
        <button onclick="kp('0')">0</button>
        <button class="act" onclick="kpEnter()">열기</button>
      </div>
      <div class="keyhelp">⌨ <b>0~9</b> 숫자 입력 · <b>Backspace</b> 한 칸 지움 · <b>Enter</b> 열기<br>
      🔑 조각을 잊었다면 위 진행도의 <b>초록 점</b>을 눌러 다시 확인!</div>
      <div class="fb" id="fb"></div>
    </div>`;
}
function kp(n){ if(keypadBuf.length<4){ keypadBuf+=n; drawKd(); } }
function kpBack(){ keypadBuf = keypadBuf.slice(0,-1); drawKd(); }
function kpClear(){ keypadBuf=""; drawKd(); setFb("",""); }
function drawKd(){
  const chars=[]; for(let i=0;i<4;i++) chars.push(keypadBuf[i]||"—");
  document.getElementById("kd").textContent = chars.join(" ");
}
function kpEnter(){
  if(keypadBuf.length<4){ setFb("no","4자리를 모두 입력하라."); return; }
  if(keypadBuf===doorCode){ clearInterval(timerId); showEscape(); }
  else{
    registerFail();
    setFb("no","🚨 잘못된 코드! 조각을 얻은 순서를 다시 떠올려 보자.");
    keypadBuf=""; drawKd();
  }
}

/* ================= 탈출 성공 & 명예의 전당 ================= */
let finalSecs = 0, submitted = false;

function showEscape(){
  const rawSecs = (Date.now()-startTime)/1000;
  finalSecs = Math.round((rawSecs + penaltySecs) * 1000) / 1000;   // 소수점 3자리
  const elapsed = fmt(finalSecs*1000);
  const penaltyNote = penaltySecs > 0
    ? `<br><span style="font-size:13px">(순수 기록 ${fmt(rawSecs*1000)} + 힌트 페널티 ${penaltySecs}초)</span>` : "";
  const boardUI = SCOREBOARD_URL ? `
      <div class="fb" id="fb"></div>
      <button class="ghost big" id="retryBtn" style="display:none" onclick="submitScore()">다시 등록 시도</button>
      <button class="ghost big" onclick="showBoard(false)">🏆 명예의 전당 보기</button>` : "";
  $screen.innerHTML = `
    <div class="card center">
      <div class="unit-tag">MISSION CLEAR</div>
      <div class="escape-art">🤖🔓🎉</div>
      <h1>${esc(playerClass)}반 ${esc(playerName)} 요원, 탈출 성공!</h1>
      <p>경비 AI가 문을 열며 말한다.<br>
      <strong>"순차, 반복, 조건, 디버깅, 추상화… 너는 이미 프로그래머처럼 생각하고 있군."</strong></p>
      <div class="stats">
        걸린 시간 <b>${elapsed}</b>${penaltyNote}<br>
        실패 횟수: ${totalFails}회 · 사용한 힌트: ${totalHints}개
      </div>
      ${boardUI}
      <button class="main big" onclick="location.reload()">↺ 처음부터 다시 하기</button>
    </div>`;
  renderTrace();
  if(SCOREBOARD_URL) submitScore();
}

let autoRetryCount = 0;
async function submitScore(){
  if(submitted) return;
  const retry = document.getElementById("retryBtn");
  retry.style.display = "none";
  if(!sessionToken){
    setFb("no","서버 세션이 없어 기록을 등록할 수 없다. (시작할 때 서버 연결에 실패한 판)");
    return;
  }
  setFb("", "서버에 기록 등록 중...");
  try{
    const res = await fetch(SCOREBOARD_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({
        action:"finish",
        token: sessionToken,
        name: playerName,
        cls: playerClass,
        penalty: penaltySecs,
        secs: finalSecs           // 탈출 순간 고정된 기록 (재시도해도 변하지 않음)
      })
    });
    const data = await res.json();
    if(data && data.ok){
      submitted = true;
      setFb("ok", `✔ 등록 완료! 공식 기록: ${fmt(data.seconds*1000)}`);
    } else if(data && data.error === "too_fast"){
      setFb("no","🚫 부정 사용으로 시간 등록이 어렵습니다.");
    } else if(data && data.error === "no_session"){
      setFb("no","이미 등록되었을 수 있다. 명예의 전당을 확인해 보자.");
    } else {
      setFb("no","등록 실패. 아래 버튼으로 다시 시도하자. (기록은 탈출 순간 기준으로 고정됨)");
      retry.style.display = "";
    }
  }catch(err){
    scheduleAutoRetry();
  }
}
/* 연결 실패 시 3초 간격 자동 재시도 (최대 10회). 기록은 이미 고정되어 불이익 없음 */
function scheduleAutoRetry(){
  const retry = document.getElementById("retryBtn");
  if(autoRetryCount < 10){
    autoRetryCount++;
    setFb("no", `연결 실패 — 3초 뒤 자동 재시도 (${autoRetryCount}/10)… 기록은 탈출 순간으로 고정되어 불이익이 없다.`);
    setTimeout(submitScore, 3000);
  } else {
    setFb("no","등록 실패. 인터넷 연결을 확인하고 아래 버튼으로 다시 시도하자. (기록은 탈출 순간 기준으로 고정됨)");
    if(retry){
      retry.style.display = "";
      retry.onclick = ()=>{ autoRetryCount = 0; submitScore(); };
    }
  }
}

async function showBoard(fromIntro){
  $screen.innerHTML = `
    <div class="card center">
      <div class="unit-tag">HALL OF FAME</div>
      <h2>🏆 명예의 전당</h2>
      <p id="bmsg">기록을 불러오는 중...</p>
      <div class="board" id="board"></div>
      <button class="ghost big" id="backBtn"></button>
    </div>`;
  const back = document.getElementById("backBtn");
  back.textContent = fromIntro ? "← 돌아가기" : "↺ 처음부터 다시 하기";
  back.onclick = ()=> fromIntro ? showIntro() : location.reload();
  try{
    const res = await fetch(SCOREBOARD_URL);
    const data = await res.json();
    const msg = document.getElementById("bmsg");
    if(!data.top || data.top.length===0){
      msg.textContent = "아직 등록된 기록이 없다. 첫 번째 탈출자가 되어 보자!";
      return;
    }
    msg.textContent = "가장 빠른 탈출 기록 TOP 10";

    /* 공동 등수: 기록(소수점 3자리)이 같으면 같은 등수,
       다음 등수는 인원수만큼 건너뛴다 (1, 2, 2, 4 …) */
    let rank = 0, prevSec = null;
    const rows = data.top.map((r,i)=>{
      const sec = Math.round(Number(r.seconds)*1000)/1000;
      if(prevSec === null || sec !== prevSec){ rank = i+1; prevSec = sec; }
      const medal = rank<=3 ? ["🥇","🥈","🥉"][rank-1] : rank;
      return `<div class="board-row${rank===1?" top1":""}">
        <span class="rank">${medal}</span>
        <span class="cl">${esc(r.cls || "-")}</span>
        <span class="nm">${esc(r.name)}</span>
        <span class="tm">${fmt(sec*1000)}</span>
      </div>`;
    }).join("");

    const head = `<div class="board-row head">
        <span class="rank"></span><span class="cl">반</span>
        <span class="nm">닉네임</span><span class="tm">기록</span>
      </div>`;
    document.getElementById("board").innerHTML = head + rows;
  }catch(err){
    document.getElementById("bmsg").textContent = "기록을 불러오지 못했다. 인터넷 연결과 URL 설정을 확인하자.";
  }
}

showIntro();
</script>
</body>
</html>
